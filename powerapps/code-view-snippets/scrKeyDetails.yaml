      Text: ="Add pen input controls manually and name them penTenantSignature and penStaffSignature before using the final submit formula."
      X: =60
      Y: =360
      Width: =360
      Height: =80
      Size: =13

- btnKeyDetailsBack:
    Control: ModernButton@1.0.0
    Properties:
      Text: ="Back"
      OnSelect: |-
        =Set(varLastActivityAt, Now());
        Navigate(scrTenantConfirm, ScreenTransition.Fade)
      X: =40
      Y: =Parent.Height - 76
      Width: =140
      Height: =44
      LayoutMinHeight: =16
      LayoutMinWidth: =16

- btnSubmitTransaction:
    Control: ModernButton@1.0.0
    Properties:
      Text: ="Submit transaction"
      DisplayMode: =If(IsBlank(varSelectedTenant) || IsBlank(varTransactionType), DisplayMode.Disabled, DisplayMode.Edit)
      OnSelect: |-
        =Set(varLastActivityAt, Now());
        Set(
            varLastTransactionId,
            Text(Now(), "yyyymmddhhmmss") & "-" & Left(Text(GUID()), 8)
        );
        Patch(
            KeyTransactions,
            Defaults(KeyTransactions),
            {
                Title: varLastTransactionId,
                TransactionID: varLastTransactionId,
                TransactionType: { Value: varTransactionType },
                TenantID: varSelectedTenant.TenantID,
                TenantName: varSelectedTenant.FullName,
                TenantEmail: varSelectedTenant.Email,
                PropertyName: varSelectedTenant.PropertyName,
                UnitReference: varSelectedTenant.UnitReference,
                FDCount: txtFDCount.Value,
                RKCount: txtRKCount.Value,
                FobCount: txtFobCount.Value,
                MailboxKeyCount: txtMailboxKeyCount.Value,
                OtherKeysDescription: txtOtherKeysDescription.Text,
                StaffName: User().FullName,
                SubmittedAt: Now(),
                Notes: txtNotes.Text
            }
        );
        Reset(txtFDCount);
        Reset(txtRKCount);
        Reset(txtFobCount);
        Reset(txtMailboxKeyCount);
        Reset(txtOtherKeysDescription);
        Reset(txtNotes);
        Set(varSelectedTenant, Blank());
        Set(varTransactionType, Blank());
        Navigate(scrSuccess, ScreenTransition.Fade)
      X: =Parent.Width - 240
      Y: =Parent.Height - 76
      Width: =200
      Height: =44
      LayoutMinHeight: =16
      LayoutMinWidth: =16
